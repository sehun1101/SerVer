<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>테트리스 익스트림</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --grid-line: #334155;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--panel-color);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        #game-board {
            border: 4px solid var(--grid-line);
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: block;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 120px;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--grid-line);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        #next-piece {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--grid-line);
            border-radius: 12px;
            margin-top: 10px;
        }

        /* 컨트롤 안내 및 모바일 컨트롤 */
        .controls-info {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
        }

        .control-btn {
            background: var(--panel-color);
            border: 2px solid var(--grid-line);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-btn:active {
            background: var(--accent-color);
            transform: scale(0.95);
        }

        /* 메시지 오버레이 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .btn-start {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        @media (max-width: 600px) {
            .game-container {
                flex-direction: column;
                padding: 10px;
            }
            .side-panel {
                flex-direction: row;
                justify-content: space-around;
                width: 100%;
            }
            .mobile-controls {
                display: grid;
            }
            .controls-info {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="overlay">
            <h1 id="overlay-title" style="margin-bottom: 20px;">TETRIS</h1>
            <button id="start-btn" class="btn-start">게임 시작</button>
        </div>

        <canvas id="game-board"></canvas>

        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">LEVEL</div>
                <div id="level" class="stat-value">1</div>
            </div>
            <div style="text-align: center;">
                <div class="stat-label">NEXT</div>
                <canvas id="next-piece" width="100" height="100"></canvas>
            </div>
        </div>
    </div>

    <div class="controls-info">
        방향키: 이동 및 회전 | 스페이스바: 하드 드롭
    </div>

    <div class="mobile-controls">
        <div class="control-btn" id="m-rotate">↻</div>
        <div class="control-btn" id="m-up">↑</div>
        <div class="control-btn" id="m-drop">⤓</div>
        <div class="control-btn" id="m-left">←</div>
        <div class="control-btn" id="m-down">↓</div>
        <div class="control-btn" id="m-right">→</div>
    </div>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');

        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = window.innerWidth < 600 ? 25 : 30;

        canvas.width = COLS * BLOCK_SIZE;
        canvas.height = ROWS * BLOCK_SIZE;

        const COLORS = [
            null,
            '#FF0D72', // T
            '#0DC2FF', // I
            '#0DFF72', // S
            '#F538FF', // Z
            '#FF8E0D', // L
            '#FFE138', // O
            '#3877FF'  // J
        ];

        const PIECES = [
            null,
            [[0, 1, 0], [1, 1, 1], [0, 0, 0]], // T
            [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]], // I
            [[0, 3, 3], [3, 3, 0], [0, 0, 0]], // S
            [[4, 4, 0], [0, 4, 4], [0, 0, 0]], // Z
            [[0, 5, 0], [0, 5, 0], [0, 5, 5]], // L
            [[6, 6], [6, 6]], // O
            [[0, 7, 0], [0, 7, 0], [7, 7, 0]]  // J
        ];

        let board = createMatrix(COLS, ROWS);
        let score = 0;
        let level = 1;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isPaused = true;

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0
        };

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function draw() {
            // 보드 배경 초기화
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 그리드 선 그리기
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 0.5;
            for(let i=0; i<=COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for(let i=0; i<=ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // 고정된 블록들 그리기
            drawMatrix(board, {x: 0, y: 0}, ctx);
            
            // 현재 조작 중인 블록 그리기 (null 체크 추가)
            if (player.matrix) {
                drawMatrix(player.matrix, player.pos, ctx);
            }
        }

        function drawMatrix(matrix, offset, context) {
            // 에러 방지를 위한 matrix 존재 여부 확인
            if (!matrix) return;
            
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const posX = (x + offset.x) * BLOCK_SIZE;
                        const posY = (y + offset.y) * BLOCK_SIZE;
                        
                        // 블록 메인 색상
                        context.fillStyle = COLORS[value];
                        context.fillRect(posX, posY, BLOCK_SIZE, BLOCK_SIZE);
                        
                        // 광택 효과 테두리
                        context.strokeStyle = 'rgba(255,255,255,0.3)';
                        context.lineWidth = 2;
                        context.strokeRect(posX + 2, posY + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
                    }
                });
            });
        }

        function drawNext() {
            nextCtx.fillStyle = '#0f172a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (player.next === null) return;
            
            const matrix = PIECES[player.next];
            const size = 20;
            const offsetX = (nextCanvas.width - matrix[0].length * size) / 2;
            const offsetY = (nextCanvas.height - matrix.length * size) / 2;

            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nextCtx.fillStyle = COLORS[value];
                        nextCtx.fillRect(x * size + offsetX, y * size + offsetY, size, size);
                        nextCtx.strokeStyle = 'rgba(255,255,255,0.2)';
                        nextCtx.strokeRect(x * size + offsetX, y * size + offsetY, size, size);
                    }
                });
            });
        }

        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        board[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function collide(board, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function playerDrop() {
            if (isPaused || !player.matrix) return;
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if (isPaused || !player.matrix) return;
            while (!collide(board, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(board, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (isPaused || !player.matrix) return;
            player.pos.x += dir;
            if (collide(board, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            if (isPaused || !player.matrix) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            if (player.next === null) {
                player.next = (Math.random() * (PIECES.length - 1) | 0) + 1;
            }
            player.matrix = PIECES[player.next];
            player.next = (Math.random() * (PIECES.length - 1) | 0) + 1;
            player.pos.y = 0;
            player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(board, player)) {
                // Game Over 상태 처리
                isPaused = true;
                overlayTitle.innerText = 'GAME OVER';
                overlay.style.display = 'flex';
                startBtn.innerText = '다시 시작';
            }
            drawNext();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y > 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;

                score += rowCount * 10;
                rowCount *= 2;
                
                if (score >= level * 100) {
                    level++;
                    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                }
            }
        }

        function updateScore() {
            scoreElement.innerText = score;
            levelElement.innerText = level;
        }

        function update(time = 0) {
            if (isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 키보드 이벤트 리스너
        document.addEventListener('keydown', event => {
            if (isPaused) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.keyCode === 32) {
                event.preventDefault(); // 페이지 스크롤 방지
                playerHardDrop();
            }
        });

        // 모바일 조작 이벤트
        document.getElementById('m-left').onclick = () => playerMove(-1);
        document.getElementById('m-right').onclick = () => playerMove(1);
        document.getElementById('m-down').onclick = () => playerDrop();
        document.getElementById('m-up').onclick = () => playerRotate(1);
        document.getElementById('m-rotate').onclick = () => playerRotate(1);
        document.getElementById('m-drop').onclick = () => playerHardDrop();

        startBtn.onclick = () => {
            overlay.style.display = 'none';
            isPaused = false;
            
            // 데이터 초기화
            board = createMatrix(COLS, ROWS);
            score = 0;
            level = 1;
            dropInterval = 1000;
            player.next = null; // 다음 블록 초기화
            
            playerReset();
            updateScore();
            lastTime = performance.now();
            update();
        };

        // 초기 화면 렌더링
        window.onload = () => {
            draw();
            drawNext();
        };
    </script>
</body>
</html>

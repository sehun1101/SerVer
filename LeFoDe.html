<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival: Safe Zone Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #444; font-family: 'Courier New', monospace; }
        canvas { display: block; cursor: crosshair; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 20px; color: #fff; text-shadow: 2px 2px 4px #000;
        }
        .weapon-slot {
            width: 45px; height: 45px; border: 2px solid #222; display: flex; 
            align-items: center; justify-content: center; font-size: 14px;
            background: rgba(0,0,0,0.7); margin-right: 5px; color: #555; font-weight: bold;
        }
        .weapon-slot.active { border-color: #2ecc71; color: #2ecc71; background: rgba(46, 204, 113, 0.3); }
        .weapon-slot.unlocked { color: #fff; border-color: #aaa; }
        #horde-timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -120%);
            font-size: 4rem; font-weight: 900; color: #ff4444; opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="horde-timer">HORDE: 30s</div>
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-tighter text-green-500">SAFE ZONE DEFENSE</h1>
                <p id="team-kills" class="text-xl text-yellow-400 font-bold">Team Kills: 0</p>
                <div class="flex mt-2" id="weapon-inventory"></div>
            </div>
            <div class="text-right">
                <div class="w-48 h-4 bg-black border border-white mb-1">
                    <div id="hp-bar-fill" class="h-full bg-red-600" style="width: 100%;"></div>
                </div>
                <p id="player-hp-text" class="text-xs mb-2">HP: 1000 / 1000</p>
                <p id="ammo-count" class="text-2xl italic font-black text-green-400">AMMO: INF</p>
                <p id="weapon-name" class="text-sm font-bold text-gray-300">권총</p>
                <p id="status-msg" class="text-lg italic text-yellow-400 font-bold"></p>
            </div>
        </div>

        <div id="death-screen" class="hidden absolute inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center pointer-events-auto">
            <h2 class="text-7xl font-black mb-4 text-red-600">OVERRUN</h2>
            <button onclick="location.reload()" class="px-10 py-4 bg-green-700 text-white font-bold hover:bg-green-600 border-2 border-green-400">RESTART</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hpBarFill = document.getElementById('hp-bar-fill');
        const playerHpText = document.getElementById('player-hp-text');
        const ammoDisplay = document.getElementById('ammo-count');
        const weaponNameDisplay = document.getElementById('weapon-name');
        const teamKillsDisplay = document.getElementById('team-kills');
        const weaponInventory = document.getElementById('weapon-inventory');
        const statusMsg = document.getElementById('status-msg');
        const hordeTimerUI = document.getElementById('horde-timer');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 플레이어 무기 설정
        const PLAYER_WEAPONS = [
            { id: 1, name: "권총", fireRate: 350, damage: 14, bulletSpeed: 16, color: '#fff', range: 500, unlockKills: 0, auto: false },
            { id: 2, name: "기관단총", fireRate: 150, damage: 12, bulletSpeed: 18, color: '#3498db', range: 450, unlockKills: 100, auto: true },
            { id: 3, name: "돌격소총", fireRate: 220, damage: 18, bulletSpeed: 20, color: '#e67e22', range: 600, unlockKills: 250, auto: true },
            { id: 4, name: "자동권총x2", fireRate: 100, damage: 13, bulletSpeed: 17, color: '#bdc3c7', range: 500, unlockKills: 400, auto: true, dual: true },
            { id: 5, name: "자동 산탄총", fireRate: 330, damage: 8.5, bulletSpeed: 15, color: '#f39c12', range: 400, unlockKills: 600, auto: true, pellets: 12 },
            { id: 6, name: "기관총", fireRate: 120, damage: 20, bulletSpeed: 22, color: '#e74c3c', range: 700, unlockKills: 1000, auto: true },
            { id: 7, name: "바주카포", fireRate: 1500, damage: 100, bulletSpeed: 12, color: '#f1c40f', range: 800, unlockKills: 1500, auto: false, explosive: 100 },
            { id: 8, name: "레이저총", fireRate: 50, damage: 25, color: '#00ffff', range: 1000, unlockKills: 2500, auto: true, isLaser: true },
            { id: 0, name: "매혹총", fireRate: 100, damage: 0, color: '#ffec3d', range: 600, unlockKills: 0, auto: true, charm: true }
        ];

        const game = {
            isGameOver: false,
            keys: {},
            mouse: { x: 0, y: 0 },
            isMouseDown: false,
            cameraX: 0,
            teamKills: 0,
            hordeActive: false,
            hordeTimeLeft: 0,
            safeZones: [
                { x: 5000, w: 1200, activated: false },
                { x: 15000, w: 1200, activated: false },
                { x: 30000, w: 1500, activated: false }
            ]
        };

        const player = {
            x: 600, y: canvas.height / 2, radius: 20, color: '#2ecc71', speed: 5.5,
            hp: 1000, maxHp: 1000, lastShot: 0, weapon: PLAYER_WEAPONS[0], lastDamageTime: 0
        };

        const survivors = [];
        const militaryGuards = [];
        const bullets = [];
        const zombies = [];
        const charmedZombies = [];

        function initInventoryUI() {
            weaponInventory.innerHTML = '';
            PLAYER_WEAPONS.sort((a,b)=> (a.id===0?10:a.id)-(b.id===0?10:b.id)).forEach((w) => {
                const slot = document.createElement('div');
                slot.className = 'weapon-slot';
                slot.id = `slot-${w.id}`;
                slot.textContent = w.id;
                weaponInventory.appendChild(slot);
            });
            updateInventoryUI();
        }

        function updateInventoryUI() {
            PLAYER_WEAPONS.forEach((w) => {
                const slot = document.getElementById(`slot-${w.id}`);
                if (game.teamKills >= w.unlockKills) {
                    slot.classList.add('unlocked');
                    if (player.weapon.id === w.id) slot.classList.add('active');
                    else slot.classList.remove('active');
                } else {
                    slot.classList.remove('unlocked', 'active');
                }
            });
        }

        class Entity {
            constructor(x, y, radius, color) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.hp = 100; this.maxHp = 100; this.lastDamageTime = 0;
            }
            draw() {
                const sx = this.x - game.cameraX;
                if (sx < -200 || sx > canvas.width + 200) return false;
                ctx.beginPath();
                ctx.arc(sx, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
                return true;
            }
        }

        class SurvivorAI extends Entity {
            constructor(x, y, type = 'SURVIVOR') {
                super(x, y, 16, type === 'MILITARY' ? '#1b5e20' : '#0277bd');
                this.type = type;
                this.speed = 3.8;
                this.lastShot = 0;
                this.weapon = { name: "AR", fireRate: 250, damage: 15, bulletSpeed: 18, color: '#ddd', range: 500 };
                this.offset = { x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*200 };
            }
            update() {
                const target = this.findNearest();
                if (target && Math.hypot(target.x-this.x, target.y-this.y) < this.weapon.range) {
                    this.shoot(target);
                }
                const tx = player.x + this.offset.x;
                const ty = player.y + this.offset.y;
                const d = Math.hypot(tx - this.x, ty - this.y);
                if (d > 80) {
                    const angle = Math.atan2(ty - this.y, tx - this.x);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;
                }
            }
            findNearest() {
                let minD = Infinity, found = null;
                for(let z of zombies) {
                    const d = Math.hypot(z.x - this.x, z.y - this.y);
                    if (d < minD) { minD = d; found = z; }
                }
                return found;
            }
            shoot(z) {
                if (Date.now() - this.lastShot > this.weapon.fireRate) {
                    const angle = Math.atan2(z.y - this.y, z.x - this.x);
                    bullets.push(new Bullet(this.x, this.y, angle, true, this.weapon));
                    this.lastShot = Date.now();
                }
            }
        }

        class Bullet {
            constructor(x, y, angle, isTeam, config) {
                this.x = x; this.y = y; this.isTeam = isTeam;
                this.speed = config.bulletSpeed || 20;
                this.damage = config.damage;
                this.color = config.color;
                this.vel = { x: Math.cos(angle) * this.speed, y: Math.sin(angle) * this.speed };
                this.explosive = config.explosive || 0;
                this.charm = config.charm || false;
                this.life = 120;
            }
            update() { this.x += this.vel.x; this.y += this.vel.y; this.life--; }
            draw() {
                const sx = this.x - game.cameraX;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.explosive ? 8 : 4;
                ctx.beginPath(); ctx.moveTo(sx, this.y); 
                ctx.lineTo(sx - this.vel.x*0.3, this.y - this.vel.y*0.3); ctx.stroke();
            }
        }

        class Zombie extends Entity {
            constructor(type = 'NORMAL', spawnPos = null) {
                let x, y;
                if (spawnPos) {
                    x = spawnPos.x; y = spawnPos.y;
                } else {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    x = game.cameraX + (side === 1 ? canvas.width + 100 : -100);
                    y = Math.random() * canvas.height;
                }
                super(x, y, type === 'NORMAL' ? 16 : 22, type === 'NORMAL' ? '#8b0000' : '#4a0000');
                this.type = type;
                this.speed = (type === 'NORMAL' ? 1.8 : 1.4) + Math.random() * 1.5;
                this.hp = type === 'NORMAL' ? (10 + Math.random()*10) : (20 + Math.random()*20);
                this.maxHp = this.hp;
                this.atk = type === 'NORMAL' ? 10 : 20;
                this.charmed = false;
            }
            update() {
                if (this.charmed) {
                    let enemy = null, minD = Infinity;
                    for(let z of zombies) {
                        const d = Math.hypot(z.x - this.x, z.y - this.y);
                        if (d < minD) { minD = d; enemy = z; }
                    }
                    if (enemy && minD < 500) {
                        const angle = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        this.x += Math.cos(angle) * (this.speed * 1.3);
                        this.y += Math.sin(angle) * (this.speed * 1.3);
                        if (minD < this.radius + enemy.radius && Date.now() - enemy.lastDamageTime > 500) {
                            enemy.hp -= this.atk; enemy.lastDamageTime = Date.now();
                        }
                    } else {
                        const angle = Date.now() * 0.001 + (charmedZombies.indexOf(this) * 0.7);
                        const tx = player.x + Math.cos(angle) * 130;
                        const ty = player.y + Math.sin(angle) * 130;
                        const d = Math.hypot(tx - this.x, ty - this.y);
                        if (d > 20) {
                            const a = Math.atan2(ty - this.y, tx - this.x);
                            this.x += Math.cos(a) * this.speed; this.y += Math.sin(a) * this.speed;
                        }
                    }
                    return;
                }
                let targets = [player, ...survivors, ...militaryGuards, ...charmedZombies];
                let minD = Infinity, target = player;
                for(let t of targets) {
                    const d = Math.hypot(t.x - this.x, t.y - this.y);
                    if (d < minD) { minD = d; target = t; }
                }
                const angle = Math.atan2(target.y - this.y, target.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                if (minD < this.radius + target.radius && Date.now() - target.lastDamageTime > ZOMBIE_ATTACK_COOLDOWN) {
                    target.hp -= this.atk; target.lastDamageTime = Date.now();
                }
            }
            draw() {
                if (super.draw()) {
                    const sx = this.x - game.cameraX;
                    ctx.fillStyle = '#000'; ctx.fillRect(sx - 15, this.y - 25, 30, 4);
                    ctx.fillStyle = this.charmed ? (this.type === 'NORMAL' ? '#ffeb3b' : '#ff9800') : '#f00';
                    ctx.fillRect(sx - 15, this.y - 25, 30 * (this.hp / this.maxHp), 4);
                }
            }
        }

        const ZOMBIE_ATTACK_COOLDOWN = 600;

        function handleInput() {
            if (game.isGameOver) return;
            if (game.keys['w']) player.y -= player.speed;
            if (game.keys['s']) player.y += player.speed;
            if (game.keys['a']) player.x -= player.speed;
            if (game.keys['d']) player.x += player.speed;

            for (let i = 0; i < 10; i++) {
                if (game.keys[i.toString()]) {
                    const targetW = PLAYER_WEAPONS.find(w => w.id === i);
                    if (targetW && game.teamKills >= targetW.unlockKills) {
                        player.weapon = targetW;
                        updateInventoryUI();
                        updateAmmoUI();
                    }
                }
            }
        }

        function handleShooting() {
            if (!game.isMouseDown || game.isGameOver) return;
            const now = Date.now();
            if (now - player.lastShot > player.weapon.fireRate) {
                const angle = Math.atan2(game.mouse.y - player.y, game.mouse.x - (player.x - game.cameraX));
                if (player.weapon.isLaser) {
                    fireLaser(angle);
                } else if (player.weapon.pellets) {
                    for(let i=0; i<player.weapon.pellets; i++) bullets.push(new Bullet(player.x, player.y, angle + (Math.random()-0.5)*0.5, true, player.weapon));
                } else if (player.weapon.dual) {
                    bullets.push(new Bullet(player.x, player.y - 12, angle, true, player.weapon));
                    bullets.push(new Bullet(player.x, player.y + 12, angle, true, player.weapon));
                } else {
                    bullets.push(new Bullet(player.x, player.y, angle, true, player.weapon));
                }
                player.lastShot = now;
                if (!player.weapon.auto) game.isMouseDown = false; 
            }
        }

        function fireLaser(angle) {
            const sx = player.x - game.cameraX;
            const tx = sx + Math.cos(angle) * player.weapon.range;
            const ty = player.y + Math.sin(angle) * player.weapon.range;
            ctx.beginPath(); ctx.moveTo(sx, player.y); ctx.lineTo(tx, ty);
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 5; ctx.stroke();
            zombies.forEach(z => {
                const zx = z.x - game.cameraX;
                const dist = Math.abs((ty-player.y)*zx - (tx-sx)*z.y + tx*player.y - ty*sx) / Math.hypot(ty-player.y, tx-sx);
                if (dist < z.radius && Math.hypot(z.x-player.x, z.y-player.y) < player.weapon.range) {
                    z.hp -= player.weapon.damage;
                    if (z.hp <= 0) {
                        zombies.splice(zombies.indexOf(z), 1);
                        game.teamKills++; updateInventoryUI();
                    }
                }
            });
        }

        function updateAmmoUI() {
            ammoDisplay.textContent = `AMMO: INF`;
            weaponNameDisplay.textContent = player.weapon.name;
            teamKillsDisplay.textContent = `Team Kills: ${game.teamKills}`;
        }

        function spawnZombies() {
            if (zombies.length < (game.hordeActive ? 150 : 80)) {
                if (game.hordeActive) {
                    // 호드 시 사방에서 스폰
                    const angle = Math.random() * Math.PI * 2;
                    const x = player.x + Math.cos(angle) * 1000;
                    const y = player.y + Math.sin(angle) * 1000;
                    zombies.push(new Zombie(Math.random() < 0.4 ? 'BRUISER' : 'NORMAL', {x, y}));
                } else {
                    if (Math.random() < 0.3) zombies.push(new Zombie('BRUISER'));
                    else zombies.push(new Zombie('NORMAL'));
                }
            }
            setTimeout(spawnZombies, game.hordeActive ? 100 : 800);
        }

        function checkSafeZones() {
            game.safeZones.forEach(zone => {
                if (!zone.activated && player.x > zone.x + 200 && player.x < zone.x + zone.w - 200) {
                    startHorde(zone);
                }
            });
        }

        function startHorde(zone) {
            zone.activated = true;
            game.hordeActive = true;
            game.hordeTimeLeft = 30;
            hordeTimerUI.style.opacity = "1";
            statusMsg.textContent = "안전지대 방어전 시작! 건물을 지키십시오!";
            
            const timer = setInterval(() => {
                game.hordeTimeLeft--;
                hordeTimerUI.textContent = `HORDE: ${game.hordeTimeLeft}s`;
                if (game.hordeTimeLeft <= 0) {
                    clearInterval(timer);
                    game.hordeActive = false;
                    hordeTimerUI.style.opacity = "0";
                    statusMsg.textContent = "방어 성공! 다음 지역으로 이동하십시오.";
                    // 보상으로 킬수 대폭 증가
                    game.teamKills += 100;
                    updateInventoryUI();
                }
            }, 1000);
        }

        function animate() {
            ctx.fillStyle = '#444'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            game.cameraX = player.x - canvas.width / 4;

            // 바닥 격자 (이동감 제공)
            ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
            for(let x = -game.cameraX % 100; x < canvas.width; x += 100) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }

            // 안전지대 및 건물 그리기
            game.safeZones.forEach(zone => {
                const sx = zone.x - game.cameraX;
                // 연두색 바닥
                ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
                ctx.fillRect(sx, 0, zone.w, canvas.height);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 5;
                ctx.strokeRect(sx, 0, zone.w, canvas.height);

                // 건물 (벙커)
                ctx.fillStyle = '#222';
                ctx.fillRect(sx + zone.w/2 - 150, canvas.height/2 - 200, 300, 400);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 3;
                ctx.strokeRect(sx + zone.w/2 - 150, canvas.height/2 - 200, 300, 400);
                ctx.fillStyle = '#111';
                ctx.fillRect(sx + zone.w/2 - 50, canvas.height/2 + 100, 100, 100); // 문
            });

            handleInput();
            handleShooting();
            checkSafeZones();

            survivors.forEach(s => { s.update(); s.draw(); });
            charmedZombies.forEach((cz, idx) => {
                cz.update();
                if (!cz.draw() || cz.hp <= 0) charmedZombies.splice(idx, 1);
            });

            for (let i = zombies.length - 1; i >= 0; i--) {
                const z = zombies[i];
                z.update();
                if (!z.draw() && Math.abs(z.x - player.x) > 3000) zombies.splice(i, 1);
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.update(); b.draw();
                let hit = false;
                for (let j = zombies.length - 1; j >= 0; j--) {
                    const z = zombies[j];
                    if (Math.hypot(b.x - z.x, b.y - z.y) < z.radius + 8) {
                        if (b.charm) {
                            z.charmed = true;
                            z.hp = z.type === 'NORMAL' ? 100 : 200;
                            z.maxHp = z.hp;
                            z.atk = z.type === 'NORMAL' ? 1 : 2;
                            charmedZombies.push(z);
                            zombies.splice(j, 1);
                            hit = true;
                        } else if (b.explosive) {
                            zombies.forEach(tz => {
                                const d = Math.hypot(b.x - tz.x, b.y - tz.y);
                                if (d < b.explosive) tz.hp -= (d > 50 ? b.damage/2 : b.damage);
                            });
                            hit = true;
                        } else {
                            z.hp -= b.damage; hit = true;
                        }
                        if (z.hp <= 0 && !z.charmed) {
                            zombies.splice(j, 1);
                            if (b.isTeam) { game.teamKills++; updateInventoryUI(); updateAmmoUI(); }
                        }
                        if (hit) { bullets.splice(i, 1); break; }
                    }
                }
                if (!hit && (b.life <= 0 || Math.abs(b.x - player.x) > 2000)) bullets.splice(i, 1);
            }

            const spx = player.x - game.cameraX;
            ctx.save(); ctx.translate(spx, player.y);
            ctx.rotate(Math.atan2(game.mouse.y - player.y, game.mouse.x - spx));
            ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#333'; ctx.fillRect(15, -5, 25, 10); ctx.restore();

            if (player.hp <= 0) { game.isGameOver = true; document.getElementById('death-screen').classList.remove('hidden'); }
            hpBarFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
            playerHpText.textContent = `HP: ${Math.floor(player.hp)} / 1000`;

            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', e => game.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => game.keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', e => { game.mouse.x = e.clientX; game.mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => game.isMouseDown = true);
        window.addEventListener('mouseup', () => game.isMouseDown = false);

        for(let i=0; i<3; i++) survivors.push(new SurvivorAI(player.x - 60, player.y));
        initInventoryUI();
        spawnZombies();
        animate();
    </script>
</body>
</html>

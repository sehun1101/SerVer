<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좀비 아포칼립스 - 생존자 군단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Pretendard', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 50; }
        #ui-layer * { pointer-events: auto; }

        #top-info { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 1.5rem; align-items: center;
            background: rgba(15, 23, 42, 0.9); padding: 12px 30px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 2px solid rgba(59, 130, 246, 0.5);
            color: white;
        }
        .info-group { text-align: center; }
        .info-label { font-size: 0.6rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
        .info-value { font-size: 1.5rem; font-weight: 900; line-height: 1; }

        #minimap-container {
            position: absolute; top: 20px; right: 20px;
            width: 180px; height: 180px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        #minimap-canvas { width: 100%; height: 100%; }

        /* Full-screen Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; color: white;
        }

        .btn-primary {
            background: linear-gradient(to right, #2563eb, #7c3aed);
            padding: 1rem 3rem; border-radius: 9999px;
            font-weight: 900; font-size: 1.5rem;
            transition: all 0.2s; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        .btn-primary:hover { transform: scale(1.05); filter: brightness(1.1); }

        .btn-list {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.5rem; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 700; transition: all 0.2s;
        }
        .btn-list:hover { background: rgba(255, 255, 255, 0.2); }

        #game-over-screen { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <a href="https://sehun1101.github.io/SerVer/GameList.html" class="btn-list">← 게임 목록</a>
            <h1 class="text-7xl font-black italic mb-2 text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-purple-600">Z-SURVIVAL</h1>
            <p class="text-slate-400 mb-10 text-xl tracking-widest">SURVIVOR LEGION</p>
            <button onclick="startGame()" class="btn-primary">게임 시작</button>
        </div>

        <!-- Game Info (Hidden during overlays) -->
        <div id="top-info" style="display: none;">
            <div class="info-group">
                <div class="info-label">남은 시간</div>
                <div id="timer-display" class="info-value text-yellow-500">--:--</div>
            </div>
            <div class="w-px h-8 bg-slate-700"></div>
            <div class="info-group">
                <div class="info-label">생존자</div>
                <div id="human-count" class="info-value text-blue-400">0</div>
            </div>
            <div class="w-px h-8 bg-slate-700"></div>
            <div class="info-group">
                <div class="info-label">좀비</div>
                <div id="zombie-count" class="info-value text-red-500">0</div>
            </div>
            <div class="w-px h-8 bg-slate-700"></div>
            <div class="info-group">
                <div class="info-label">공격력</div>
                <div id="dmg-display" class="info-value text-orange-400">100</div>
            </div>
        </div>

        <div id="minimap-container" style="display: none;">
            <canvas id="minimap-canvas"></canvas>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay">
            <a href="https://sehun1101.github.io/SerVer/GameList.html" class="btn-list">← 게임 목록</a>
            <h1 id="over-title" class="text-8xl font-black italic mb-4">TERMINATED</h1>
            <p id="over-reason" class="text-2xl text-slate-400 mb-8 max-w-2xl text-center italic"></p>
            <div class="flex flex-col items-center gap-4">
                <button onclick="restartGame()" class="btn-primary">지금 다시하기</button>
                <p id="auto-restart-text" class="text-slate-500 font-bold uppercase tracking-tighter">15초 후 자동 시작...</p>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap-canvas');
        const mctx = minimapCanvas.getContext('2d');
        
        // UI Elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const topInfo = document.getElementById('top-info');
        const minimapContainer = document.getElementById('minimap-container');
        const timerDisplay = document.getElementById('timer-display');
        const humanCountEl = document.getElementById('human-count');
        const zombieCountEl = document.getElementById('zombie-count');
        const dmgDisplayEl = document.getElementById('dmg-display');
        const overTitle = document.getElementById('over-title');
        const overReason = document.getElementById('over-reason');
        const autoRestartText = document.getElementById('auto-restart-text');

        // World Settings
        const WORLD_WIDTH = 5000;
        const WORLD_HEIGHT = 4000;
        const TOTAL_PEOPLE = 100;
        const GAME_DURATION = 310000; 
        const INFECTION_TRIGGER_TIME = 8000;
        
        // Constants
        const PLAYER_HERO_SPEED = 500;
        const INITIAL_HUMAN_SPEED = 250;
        const INITIAL_ALPHA_SPEED = 400;
        const INITIAL_ZOMBIE_SPEED = 500;
        const INITIAL_ZOMBIE_HP = 1000;
        const PLAYER_HERO_DMG = 100;
        const ALPHA_DMG_REDUCTION = 0.90;

        const CLASS_TYPES = ['SOLDIER', 'SNIPER', 'POLICE', 'BERSERKER', 'TANKER', 'BUFFER'];

        let deadHumanCount = 0;
        let zombieKillCount = 0;
        let gameActive = false;
        let lastTime = 0;
        let startTime = 0;
        let infectionStarted = false;
        let respawnQueue = [];
        let player;
        let entities = [];
        let bullets = [];
        let particles = [];
        let restartTimer = null;

        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { x: 0, y: 0, isDown: false };

        class Entity {
            constructor(x, y, radius, color, isPlayer = false, classType = 'SOLDIER') {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.isPlayer = isPlayer; this.isZombie = false; this.isAlpha = false; this.isDead = false;
                this.classType = classType;
                
                this.maxHp = 100;
                if (classType === 'BERSERKER' || classType === 'TANKER') this.maxHp = 10000; 
                this.hp = this.maxHp;
                
                this.lastShootTime = 0; 
                this.slowTimer = 0;
                this.thinkingDir = Math.random() < 0.5 ? 1 : -1;
                this.isFiring = false;
                this.rotation = 0;
                this.buffed = false;
            }

            get speed() {
                if (this.isZombie) {
                    let base = this.isAlpha ? (INITIAL_ALPHA_SPEED + (deadHumanCount * 8)) : INITIAL_ZOMBIE_SPEED;
                    // 숙주(Alpha) 좀비도 공격받으면 일반 좀비보다 강력하게 50% 감속 (2배 페널티)
                    if (this.slowTimer > 0) return base * 0.5;
                    return base;
                }
                
                if (this.isPlayer) return PLAYER_HERO_SPEED;
                let base = INITIAL_HUMAN_SPEED + (deadHumanCount * 10);
                if (this.isFiring && this.classType !== 'POLICE' && !this.isPlayer) base *= 0.5;
                return base;
            }

            get currentDamage() {
                let baseDmg = 10;
                let growth = deadHumanCount;
                if (this.isPlayer) { baseDmg = PLAYER_HERO_DMG; growth = zombieKillCount * 10; }
                else {
                    switch(this.classType) {
                        case 'SNIPER': baseDmg = 200; growth = deadHumanCount * 2; break;
                        case 'BERSERKER': baseDmg = 100; growth = deadHumanCount; break;
                        case 'POLICE': baseDmg = 10; growth = deadHumanCount; break;
                        default: baseDmg = 10; growth = deadHumanCount;
                    }
                }
                let final = baseDmg + growth;
                if (this.buffed) final *= 10;
                return final;
            }

            get shootCooldown() {
                if (this.isPlayer) return 100;
                switch(this.classType) {
                    case 'SNIPER': return 1000;
                    case 'POLICE': return 200;
                    case 'BERSERKER': return 500;
                    default: return 500;
                }
            }

            draw(camX, camY) {
                if (this.isDead) return;
                ctx.save();
                ctx.translate(this.x - camX, this.y - camY);
                ctx.rotate(this.rotation);
                const r = this.isAlpha ? this.radius * 2.2 : this.radius;

                if (this.isPlayer) { ctx.shadowBlur = 20; ctx.shadowColor = '#fbbf24'; }
                if (this.isAlpha) { ctx.shadowBlur = 40; ctx.shadowColor = '#ff0000'; }

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

                if (!this.isZombie) {
                    ctx.fillStyle = '#334155';
                    if (this.classType !== 'TANKER' && this.classType !== 'BUFFER') {
                        const gunW = (this.classType === 'SNIPER') ? r * 2.5 : r * 1.5;
                        ctx.fillRect(r * 0.5, -4, gunW, 8);
                    }
                }

                ctx.fillStyle = this.isZombie ? (this.slowTimer > 0 ? '#ffffff' : '#ff0000') : '#ffffff';
                ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.3, 3, 0, Math.PI * 2); ctx.arc(r * 0.3, r * 0.3, 3, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                if (this.hp < this.maxHp) {
                    ctx.save(); ctx.translate(this.x - camX, this.y - camY);
                    const bw = r * 3;
                    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(-bw/2, -r - 20, bw, 8);
                    ctx.fillStyle = this.isZombie ? '#22c55e' : (this.buffed ? '#f59e0b' : '#3b82f6');
                    ctx.fillRect(-bw/2, -r - 20, (this.hp/this.maxHp) * bw, 8);
                    ctx.restore();
                }
            }

            move(dx, dy) {
                if (dx === 0 && dy === 0) return;
                const r = this.isAlpha ? this.radius * 2.2 : this.radius;
                const magnitude = Math.sqrt(dx*dx + dy*dy);
                const currentSpeed = this.speed;
                if (magnitude > currentSpeed) { dx = (dx / magnitude) * currentSpeed; dy = (dy / magnitude) * currentSpeed; }
                this.x = Math.max(r, Math.min(WORLD_WIDTH - r, this.x + dx));
                this.y = Math.max(r, Math.min(WORLD_HEIGHT - r, this.y + dy));
                this.rotation = Math.atan2(dy, dx);
            }

            takeDamage(dmg, angle, isAlphaAttacker = false) {
                if (this.isDead) return;
                let finalDmg = dmg;
                if (this.isAlpha && !this.isPlayer) finalDmg = dmg * (1 - ALPHA_DMG_REDUCTION);
                if (this.classType === 'BERSERKER' || this.classType === 'TANKER') finalDmg = isAlphaAttacker ? 1000 : 100;

                this.hp -= finalDmg;
                this.slowTimer = 10; 

                const kbIntensity = (this.classType === 'TANKER' || this.isAlpha) ? 1 : 5;
                this.move(Math.cos(angle) * kbIntensity, Math.sin(angle) * kbIntensity);
                
                if (this.hp <= 0) {
                    if (this.isPlayer) this.die();
                    else infect(this);
                }
            }

            die() {
                if (this.isDead) return;
                this.isDead = true;
                if (this.isZombie) {
                    createParticles(this.x, this.y, '#22c55e', 40);
                    respawnQueue.push({ entity: this, time: Date.now() + 5000 });
                } else {
                    createParticles(this.x, this.y, '#ef4444', 50);
                    deadHumanCount++;
                }
            }

            updateAI(zombies, humans) {
                if (this.isPlayer || this.isDead) return;
                const now = Date.now();
                if (this.slowTimer > 0) this.slowTimer--;

                if (this.isZombie) {
                    let target = null; let minDist = Infinity;
                    const list = [...humans]; if(!player.isZombie && !player.isDead) list.push(player);
                    list.forEach(h => {
                        const d = (this.x - h.x)**2 + (this.y - h.y)**2;
                        if(d < minDist) { minDist = d; target = h; }
                    });
                    if (target) {
                        const angle = Math.atan2(target.y - this.y, target.x - this.x);
                        const s = this.speed / 60;
                        this.move(Math.cos(angle) * s, Math.sin(angle) * s);
                        if (Math.hypot(this.x - target.x, this.y - target.y) < (this.isAlpha ? 45 : 20) + target.radius + 15) {
                            target.takeDamage(100, angle, this.isAlpha);
                        }
                    }
                } else {
                    let enemy = null; let minDist = Infinity;
                    zombies.forEach(z => {
                        const d = (this.x - z.x)**2 + (this.y - z.y)**2;
                        if(d < minDist) { minDist = d; enemy = z; }
                    });
                    const realDist = Math.sqrt(minDist);
                    this.isFiring = false;
                    if (enemy && realDist < 1200) {
                        this.isFiring = true;
                        if (now - this.lastShootTime > this.shootCooldown) {
                            if (this.classType === 'BERSERKER' && realDist < 100) { this.meleeAttack(zombies); this.lastShootTime = now; }
                            else if (this.classType !== 'TANKER') { this.shootAt(enemy); this.lastShootTime = now; }
                        }
                        const angleToEnemy = Math.atan2(this.y - enemy.y, this.x - enemy.x);
                        const s = this.speed / 60;
                        if (this.classType === 'BERSERKER') this.move(-Math.cos(angleToEnemy) * s, -Math.sin(angleToEnemy) * s);
                        else if (this.classType === 'TANKER') {
                            this.rotation = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                            if (realDist > 150) this.move(-Math.cos(angleToEnemy) * s, -Math.sin(angleToEnemy) * s);
                        } else {
                            if (realDist < 450) this.move(Math.cos(angleToEnemy) * s, Math.sin(angleToEnemy) * s);
                            else {
                                const strafeAngle = angleToEnemy + Math.PI/2 * this.thinkingDir;
                                this.move(Math.cos(strafeAngle) * s * 0.6, Math.sin(strafeAngle) * s * 0.6);
                                if (Math.random() < 0.01) this.thinkingDir *= -1;
                            }
                        }
                    } else {
                        const dx = WORLD_WIDTH/2 - this.x; const dy = WORLD_HEIGHT/2 - this.y;
                        if (Math.abs(dx) > 400 || Math.abs(dy) > 400) {
                            const angle = Math.atan2(dy, dx);
                            this.move(Math.cos(angle) * (this.speed/100), Math.sin(angle) * (this.speed/100));
                        }
                    }
                }
            }

            shootAt(target) {
                const angle = Math.atan2(target.y - this.y, target.x - this.x);
                this.rotation = angle;
                if (this.isPlayer) {
                    const spread = 0.18;
                    [angle - spread, angle, angle + spread].forEach(a => {
                        bullets.push({ x: this.x, y: this.y, angle: a, vx: Math.cos(a) * 35, vy: Math.sin(a) * 35, life: 150, owner: this, damage: this.currentDamage, kb: 1 });
                    });
                } else {
                    const a = angle + (Math.random()-0.5)*0.08;
                    bullets.push({ x: this.x, y: this.y, angle: a, vx: Math.cos(a) * 35, vy: Math.sin(a) * 35, life: 150, owner: this, damage: this.currentDamage, kb: 1 });
                }
            }

            meleeAttack(zombies) {
                const range = 150;
                createParticles(this.x, this.y, '#ef4444', 20);
                zombies.forEach(z => {
                    if (Math.hypot(this.x - z.x, this.y - z.y) < range) z.takeDamage(this.currentDamage, Math.atan2(z.y - this.y, z.x - this.x), true);
                });
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            topInfo.style.display = 'flex';
            minimapContainer.style.display = 'block';
            initGame();
        }

        function restartGame() {
            if (restartTimer) clearInterval(restartTimer);
            gameOverScreen.style.display = 'none';
            initGame();
        }

        function initGame() {
            resize(); 
            gameActive = true; infectionStarted = false; startTime = Date.now();
            entities = []; bullets = []; particles = []; respawnQueue = [];
            deadHumanCount = 0; zombieKillCount = 0;
            
            player = new Entity(WORLD_WIDTH/2, WORLD_HEIGHT/2, 22, '#3b82f6', true, 'SOLDIER');
            for(let i=0; i<TOTAL_PEOPLE-1; i++) {
                const x = Math.random() * (WORLD_WIDTH - 600) + 300;
                const y = Math.random() * (WORLD_HEIGHT - 600) + 300;
                const type = CLASS_TYPES[Math.floor(Math.random() * CLASS_TYPES.length)];
                const colors = { SOLDIER: '#fcd34d', SNIPER: '#94a3b8', POLICE: '#3b82f6', BERSERKER: '#ef4444', TANKER: '#475569', BUFFER: '#a855f7' };
                entities.push(new Entity(x, y, 20, colors[type], false, type));
            }
            requestAnimationFrame(gameLoop);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        function update() {
            if (!gameActive) return;
            const now = Date.now();
            const remain = Math.max(0, GAME_DURATION - (now - startTime));
            timerDisplay.innerText = `${Math.floor(remain/60000).toString().padStart(2,'0')}:${Math.floor((remain%60000)/1000).toString().padStart(2,'0')}`;

            if(remain <= 0) endGame("SURVIVED", "구조 헬기가 도착했습니다! 인류는 생존했습니다.", true);
            if(!infectionStarted && (now - startTime) > INFECTION_TRIGGER_TIME) startInfection();

            const hpStats = { normal: INITIAL_ZOMBIE_HP + (deadHumanCount * 100), alpha: (INITIAL_ZOMBIE_HP + (deadHumanCount * 100)) * 10 };

            for(let i=respawnQueue.length-1; i>=0; i--) {
                if(now > respawnQueue[i].time) {
                    const e = respawnQueue[i].entity;
                    e.x = Math.random() * WORLD_WIDTH; e.y = Math.random() * WORLD_HEIGHT;
                    e.isDead = false; e.maxHp = e.isAlpha ? hpStats.alpha : hpStats.normal; e.hp = e.maxHp;
                    respawnQueue.splice(i, 1);
                }
            }

            if(!player.isDead) {
                if (player.slowTimer > 0) player.slowTimer--;
                player.isFiring = mouse.isDown && !player.isZombie;
                let dx=0, dy=0;
                if(keys.w) dy -= 1; if(keys.s) dy += 1;
                if(keys.a) dx -= 1; if(keys.d) dx += 1;
                player.move(dx * (player.speed/60), dy * (player.speed/60));
                const camX = player.x - canvas.width/2; const camY = player.y - canvas.height/2;
                player.rotation = Math.atan2((mouse.y + camY) - player.y, (mouse.x + camX) - player.x);
                if(player.isFiring && now - player.lastShootTime > player.shootCooldown) {
                    player.shootAt({x: mouse.x + camX, y: mouse.y + camY}); 
                    player.lastShootTime = now;
                }
                dmgDisplayEl.innerText = player.currentDamage;
            }

            const zombies = entities.filter(e => e.isZombie && !e.isDead);
            if(player.isZombie && !player.isDead) zombies.push(player);
            const humans = entities.filter(e => !e.isZombie && !e.isDead);

            if(infectionStarted && humans.length === 0 && (player.isZombie || player.isDead)) {
                endGame("EXTINCT", "모든 생존자가 좀비가 되었습니다. 인류가 멸망했습니다.", false);
            }

            entities.forEach(e => e.updateAI(zombies, humans));

            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;
                let hit = false;
                if(!b.owner.isZombie) {
                    for(let z of zombies) {
                        const r = z.isAlpha ? z.radius*2.2 : z.radius;
                        if(Math.hypot(b.x-z.x, b.y-z.y) < r + 10) { z.takeDamage(b.damage, b.angle, b.owner.isPlayer); hit = true; break; }
                    }
                }
                if(hit || b.life <= 0 || b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) bullets.splice(i, 1);
            }

            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.alpha -= 0.04; if(p.alpha <= 0) particles.splice(i, 1); });
            humanCountEl.innerText = humans.length + (player.isZombie || player.isDead ? 0 : 1);
            zombieCountEl.innerText = zombies.length;
        }

        function startInfection() {
            infectionStarted = true;
            const hpStats = { normal: INITIAL_ZOMBIE_HP + (deadHumanCount * 100), alpha: (INITIAL_ZOMBIE_HP + (deadHumanCount * 100)) * 10 };
            for(let i=0; i<3; i++) {
                const target = entities[Math.floor(Math.random()*entities.length)];
                target.isAlpha = true; infect(target); target.hp = target.maxHp = hpStats.alpha;
            }
        }

        function infect(e) {
            if(e.isZombie && !e.isAlpha) return;
            const wasHuman = !e.isZombie; e.isZombie = true; e.classType = 'ZOMBIE';
            e.color = e.isAlpha ? '#b91c1c' : '#065f46';
            if(!e.isAlpha) { e.maxHp = e.hp = INITIAL_ZOMBIE_HP + (deadHumanCount * 100); }
            createParticles(e.x, e.y, '#4ade80', 40);
            if (wasHuman) deadHumanCount++;
        }

        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) particles.push({ x, y, color, alpha: 1, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, radius: Math.random()*5 + 1 });
        }

        function endGame(title, reason, win) {
            gameActive = false;
            overTitle.innerText = title;
            overTitle.style.color = win ? '#3b82f6' : '#ef4444';
            overReason.innerText = reason;
            gameOverScreen.style.display = 'flex';
            
            let timeLeft = 15;
            autoRestartText.innerText = `${timeLeft}초 후 자동 시작...`;
            if (restartTimer) clearInterval(restartTimer);
            restartTimer = setInterval(() => {
                timeLeft--;
                autoRestartText.innerText = `${timeLeft}초 후 자동 시작...`;
                if (timeLeft <= 0) { clearInterval(restartTimer); restartGame(); }
            }, 1000);
        }

        function draw() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(!gameActive && entities.length === 0) return;
            const camX = player.x - canvas.width/2; const camY = player.y - canvas.height/2;

            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            for(let x=0; x<=WORLD_WIDTH; x+=250) { ctx.beginPath(); ctx.moveTo(x-camX, -camY); ctx.lineTo(x-camX, WORLD_HEIGHT-camY); ctx.stroke(); }
            for(let y=0; y<=WORLD_HEIGHT; y+=250) { ctx.beginPath(); ctx.moveTo(-camX, y-camY); ctx.lineTo(WORLD_WIDTH-camX, y-camY); ctx.stroke(); }
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 10; ctx.strokeRect(-camX, -camY, WORLD_WIDTH, WORLD_HEIGHT);

            entities.forEach(e => e.draw(camX, camY)); player.draw(camX, camY);
            bullets.forEach(b => { 
                ctx.fillStyle = b.owner.isPlayer ? '#fbbf24' : '#fde047'; 
                ctx.beginPath(); ctx.arc(b.x-camX, b.y-camY, 6, 0, Math.PI*2); ctx.fill(); 
            });
            particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x-camX, p.y-camY, p.radius, 0, Math.PI*2); ctx.fill(); ctx.restore(); });

            mctx.fillStyle = '#0f172a'; mctx.fillRect(0, 0, 180, 180);
            const ms = 0.035, mx = 90, my = 90;
            entities.forEach(e => {
                if(e.isDead) return;
                const ex = (e.x-player.x)*ms+mx, ey = (e.y-player.y)*ms+my;
                if(ex>0 && ex<180 && ey>0 && ey<180) { mctx.fillStyle = e.isZombie ? (e.isAlpha ? '#ff0000' : '#10b981') : '#60a5fa'; mctx.beginPath(); mctx.arc(ex, ey, e.isAlpha ? 4 : 2, 0, Math.PI*2); mctx.fill(); }
            });
            mctx.fillStyle = '#fbbf24'; mctx.beginPath(); mctx.arc(mx, my, 4, 0, Math.PI*2); mctx.fill();
        }

        function gameLoop(ts) {
            update(); draw(); if(gameActive) requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => mouse.isDown = true);
        window.addEventListener('mouseup', () => mouse.isDown = false);
        window.addEventListener('resize', resize);
        window.onload = resize;
    </script>
</body>
</html>

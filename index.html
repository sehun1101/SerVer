<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Link Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .btn-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-hover:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.25);
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translatey(0px); }
            50% { transform: translatey(-20px); }
            100% { transform: translatey(0px); }
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="p-4">

    <!-- Background Decoration -->
    <div class="absolute top-20 left-20 w-32 h-32 bg-yellow-400 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-48 h-48 bg-pink-400 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-bounce"></div>

    <div class="glass-morphism w-full max-w-lg p-10 text-center relative z-10 floating">
        <h1 class="text-4xl font-extrabold text-white mb-2">이산타의 게임 사이트</h1>
        <p class="text-blue-100 mb-10 opacity-80">원하는 목적지를 클릭하여 이동하세요</p>

        <div class="grid grid-cols-1 gap-6">
            <!-- Dynamic Buttons -->
            <button onclick="navigate('https://sehun1101.github.io/SerVer/GameList.html', this)" class="btn-hover relative overflow-hidden bg-white/10 text-white py-4 px-8 rounded-xl font-semibold flex items-center justify-between group">
                <span class="flex items-center">
                    <span class="mr-3">🔍</span> 게임 목록
                </span>
                <span class="opacity-0 group-hover:opacity-100 transition-opacity">이동하기 &rarr;</span>
            </button>

            <button onclick="navigate('https://www.naver.com', this)" class="btn-hover relative overflow-hidden bg-white/10 text-white py-4 px-8 rounded-xl font-semibold flex items-center justify-between group">
                <span class="flex items-center">
                    <span class="mr-3">💚</span> Naver 포털
                </span>
                <span class="opacity-0 group-hover:opacity-100 transition-opacity">이동하기 &rarr;</span>
            </button>

            <button onclick="navigate('https://www.youtube.com', this)" class="btn-hover relative overflow-hidden bg-white/10 text-white py-4 px-8 rounded-xl font-semibold flex items-center justify-between group">
                <span class="flex items-center">
                    <span class="mr-3">🎥</span> YouTube 영상
                </span>
                <span class="opacity-0 group-hover:opacity-100 transition-opacity">이동하기 &rarr;</span>
            </button>

            <button onclick="navigate('https://www.github.com', this)" class="btn-hover relative overflow-hidden bg-white/10 text-white py-4 px-8 rounded-xl font-semibold flex items-center justify-between group">
                <span class="flex items-center">
                    <span class="mr-3">💻</span> GitHub 코드
                </span>
                <span class="opacity-0 group-hover:opacity-100 transition-opacity">이동하기 &rarr;</span>
            </button>
        </div>

        <div id="status-message" class="mt-8 text-sm text-white/50 h-6"></div>
    </div>

    <script>
        function navigate(url, element) {
            // Create Ripple Effect
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            element.appendChild(ripple);
            
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `0px`;
            ripple.style.top = `0px`;

            const status = document.getElementById('status-message');
            status.innerText = `${url}로 연결 중...`;
            
            // Artificial delay for visual feedback
            setTimeout(() => {
                window.location.href = url;
            }, 600);
        }

        // Add hover sound or extra logic if needed
        console.log("Site Ready: Navigation Dashboard Loaded");
    </script>
</body>
</html>

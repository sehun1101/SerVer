<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 기반 사용자 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        .loader {
            border-top-color: #4f46e5;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
        <p class="text-slate-500 font-medium">시스템 준비 중...</p>
    </div>

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        
        <!-- 1. Auth Section (Login/Register) -->
        <div id="auth-section" class="hidden fade-in py-10">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                <div class="bg-indigo-600 p-6 text-white text-center">
                    <h2 id="auth-title" class="text-2xl font-bold">로그인</h2>
                    <p id="auth-subtitle" class="text-indigo-100 text-sm mt-1">아이디와 비밀번호로 접속하세요</p>
                </div>
                
                <form id="auth-form" class="p-8 space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">아이디</label>
                        <input type="text" id="auth-username" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="사용할 아이디 입력">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">비밀번호</label>
                        <input type="password" id="auth-password" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
                    </div>
                    
                    <div id="auth-error" class="hidden text-red-500 text-sm bg-red-50 p-3 rounded-lg border border-red-100"></div>

                    <button type="submit" id="auth-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-indigo-200 transition-all transform active:scale-[0.98]">
                        로그인
                    </button>
                    
                    <div class="text-center pt-4">
                        <button type="button" id="toggle-auth-mode" class="text-indigo-600 hover:underline text-sm font-medium">
                            계정이 없으신가요? 회원가입하기
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 2. Main Dashboard Section -->
        <div id="main-section" class="hidden fade-in">
            <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">사용자 관리 서버</h1>
                    <p class="text-slate-500 flex items-center mt-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                        실시간 클라우드 데이터베이스 연결됨
                    </p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-id" class="text-sm font-semibold text-slate-700 truncate max-w-[150px]"></p>
                        <button onclick="handleLogout()" class="text-xs text-red-500 hover:underline font-medium">로그아웃</button>
                    </div>
                    <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-md flex items-center hover:shadow-indigo-100">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        사용자 추가
                    </button>
                </div>
            </header>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-500">성함</th>
                                <th class="px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-500">이메일/연락처</th>
                                <th class="px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-500">직업/역할</th>
                                <th class="px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-500 text-right">작업</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
                <div id="empty-state" class="hidden py-24 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-100 rounded-full mb-4 text-slate-400">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <p class="text-slate-400 font-medium">등록된 정보가 없습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all animate-in zoom-in duration-200">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800">사용자 정보 입력</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 hover:bg-slate-100 rounded-lg transition-all">&times;</button>
            </div>
            <form id="user-form" class="p-6 space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">성함</label>
                    <input type="text" id="user-name" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="홍길동">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">이메일/연락처</label>
                    <input type="text" id="user-email" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="example@mail.com 또는 010-0000-0000">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">직업 및 역할</label>
                    <input type="text" id="user-role" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="개발자, 매니저 등">
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-3 border border-slate-200 text-slate-600 rounded-xl font-semibold hover:bg-slate-50 transition-all">취소</button>
                    <button type="submit" class="flex-1 px-4 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, getDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'id-only-auth-system';

        let currentUser = null;
        let isLoginMode = true;
        let dataUnsubscribe = null;

        // 아이디를 이메일 형식으로 변환하는 도우미 함수
        const formatAsEmail = (username) => {
            if (username.includes('@')) return username;
            return `${username}@user.system`;
        };

        const authForm = document.getElementById('auth-form');
        const toggleBtn = document.getElementById('toggle-auth-mode');
        const authError = document.getElementById('auth-error');

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? '로그인' : '회원가입';
            document.getElementById('auth-subtitle').textContent = isLoginMode ? '아이디와 비밀번호로 접속하세요' : '새로운 아이디를 생성하세요';
            document.getElementById('auth-submit-btn').textContent = isLoginMode ? '로그인' : '회원가입 완료';
            toggleBtn.textContent = isLoginMode ? '계정이 없으신가요? 회원가입하기' : '이미 계정이 있으신가요? 로그인하기';
            authError.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const emailFormat = formatAsEmail(username);
            
            authError.classList.add('hidden');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, emailFormat, password);
                } else {
                    await createUserWithEmailAndPassword(auth, emailFormat, password);
                }
            } catch (error) {
                authError.textContent = getErrorMessage(error.code);
                authError.classList.remove('hidden');
            }
        });

        const getErrorMessage = (code) => {
            switch(code) {
                case 'auth/email-already-in-use': return '이미 존재하는 아이디입니다.';
                case 'auth/invalid-email': return '아이디 형식이 올바르지 않습니다.';
                case 'auth/weak-password': return '비밀번호는 최소 6자 이상이어야 합니다.';
                case 'auth/user-not-found': case 'auth/wrong-password': case 'auth/invalid-credential':
                    return '아이디 또는 비밀번호가 틀렸습니다.';
                default: return '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
            }
        };

        window.handleLogout = async () => {
            if (dataUnsubscribe) dataUnsubscribe();
            await signOut(auth);
            window.location.reload();
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                // 이메일에서 아이디 부분만 추출하여 표시
                document.getElementById('user-display-id').textContent = user.email.split('@')[0];
                initDataListener();
            } else {
                currentUser = null;
                document.getElementById('main-section').classList.add('hidden');
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        const initDataListener = () => {
            if (!currentUser) return;
            const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'people');
            
            dataUnsubscribe = onSnapshot(colPath, (snapshot) => {
                const list = document.getElementById('user-list');
                const empty = document.getElementById('empty-state');
                list.innerHTML = '';
                
                if (snapshot.empty) {
                    empty.classList.remove('hidden');
                } else {
                    empty.classList.add('hidden');
                    snapshot.forEach(doc => renderRow(doc.id, doc.data()));
                }
            }, (err) => console.error("Listen error:", err));
        };

        const renderRow = (id, data) => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors group";
            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap font-semibold text-slate-900">${data.name}</td>
                <td class="px-6 py-4 whitespace-nowrap text-slate-500 text-sm">${data.email}</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-2.5 py-1 text-[11px] font-bold rounded-full bg-slate-100 text-slate-600 group-hover:bg-indigo-100 group-hover:text-indigo-700 transition-colors uppercase">${data.role}</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm space-x-3">
                    <button onclick="editUser('${id}')" class="text-indigo-600 hover:text-indigo-900 font-bold">수정</button>
                    <button onclick="deleteUser('${id}')" class="text-slate-400 hover:text-red-600 font-bold transition-colors">삭제</button>
                </td>
            `;
            document.getElementById('user-list').appendChild(tr);
        };

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const role = document.getElementById('user-role').value;
            const editId = document.getElementById('edit-id').value;

            const payload = {
                name, email, role,
                updatedAt: new Date().toISOString(),
                createdBy: currentUser.email.split('@')[0]
            };

            try {
                const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'people');
                if (editId) {
                    await updateDoc(doc(colPath, editId), payload);
                } else {
                    await addDoc(colPath, payload);
                }
                closeModal();
            } catch (err) {
                alert("오류 발생: " + err.message);
            }
        });

        window.openModal = (title = "사용자 등록", id = "") => {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('edit-id').value = id;
            if (!id) document.getElementById('user-form').reset();
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        window.editUser = async (id) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'people', id);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('user-name').value = d.name;
                document.getElementById('user-email').value = d.email;
                document.getElementById('user-role').value = d.role;
                openModal("사용자 정보 수정", id);
            }
        };

        window.deleteUser = async (id) => {
            if (confirm("이 데이터를 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'people', id));
            }
        };
    </script>
</body>
</html>

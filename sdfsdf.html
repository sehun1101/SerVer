<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 데이터 분석 및 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Math Data Analyzer</h1>
            <p class="text-slate-600">수학 데이터를 저장하고 다양한 통계 및 함수 계산을 수행하세요.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Input & Storage Section -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-xl font-semibold mb-4 flex items-center">
                        <span class="mr-2">📥</span> 데이터 입력
                    </h2>
                    <div class="flex gap-2 mb-4">
                        <input type="number" id="dataInput" placeholder="숫자 입력" 
                               class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="addData()" 
                                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                            추가
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="clearData()" 
                                class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 rounded-lg transition-colors text-sm font-medium">
                            전체 초기화
                        </button>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-sm h-[400px] flex flex-col">
                    <h2 class="text-xl font-semibold mb-4 flex items-center justify-between">
                        <span>📋 데이터 목록</span>
                        <span id="dataCount" class="text-sm bg-blue-100 text-blue-700 px-2 py-1 rounded-full">0개</span>
                    </h2>
                    <div id="dataList" class="flex-1 overflow-y-auto space-y-2 pr-2">
                        <!-- Items will be added here -->
                        <p class="text-slate-400 text-center mt-10">데이터가 없습니다.</p>
                    </div>
                </div>
            </div>

            <!-- Analysis & Results Section -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Statistics Grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="glass-card p-4 rounded-xl text-center">
                        <p class="text-sm text-slate-500 mb-1">합계 ($\sum$)</p>
                        <p id="statSum" class="text-xl font-bold text-blue-600">0</p>
                    </div>
                    <div class="glass-card p-4 rounded-xl text-center">
                        <p class="text-sm text-slate-500 mb-1">평균 ($\bar{x}$)</p>
                        <p id="statAvg" class="text-xl font-bold text-emerald-600">0</p>
                    </div>
                    <div class="glass-card p-4 rounded-xl text-center">
                        <p class="text-sm text-slate-500 mb-1">중앙값 ($Q_2$)</p>
                        <p id="statMedian" class="text-xl font-bold text-orange-600">0</p>
                    </div>
                    <div class="glass-card p-4 rounded-xl text-center">
                        <p class="text-sm text-slate-500 mb-1">표준편차 ($\sigma$)</p>
                        <p id="statStdDev" class="text-xl font-bold text-purple-600">0</p>
                    </div>
                </div>

                <!-- Chart Section -->
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-xl font-semibold mb-4">📈 데이터 시각화</h2>
                    <div class="h-64">
                        <canvas id="dataChart"></canvas>
                    </div>
                </div>

                <!-- Advanced Calculation Section -->
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-xl font-semibold mb-4">🧪 함수 일괄 적용 ($f(x)$)</h2>
                    <div class="flex flex-wrap gap-4 items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-slate-700 font-medium">$f(x) =$</span>
                            <input type="number" id="funcMult" value="1" step="0.1" class="w-16 px-2 py-1 border rounded">
                            <span class="text-slate-700 font-medium">$\cdot x +$</span>
                            <input type="number" id="funcAdd" value="0" step="1" class="w-16 px-2 py-1 border rounded">
                        </div>
                        <button onclick="applyFunction()" 
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition-colors">
                            계산 실행
                        </button>
                    </div>
                    <div id="funcResult" class="mt-4 p-4 bg-slate-50 rounded-lg min-h-[50px] text-slate-600 break-all">
                        함수를 적용하면 여기에 결과가 표시됩니다.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataStorage = [];
        let chartInstance = null;

        // Initialize Chart
        function initChart() {
            const ctx = document.getElementById('dataChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '데이터 값',
                        data: [],
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Add Data
        function addData() {
            const input = document.getElementById('dataInput');
            const val = parseFloat(input.value);
            
            if (!isNaN(val)) {
                dataStorage.push(val);
                input.value = '';
                input.focus();
                updateUI();
            }
        }

        // Delete specific item
        function deleteItem(index) {
            dataStorage.splice(index, 1);
            updateUI();
        }

        // Clear all
        function clearData() {
            dataStorage = [];
            document.getElementById('funcResult').innerText = "함수를 적용하면 여기에 결과가 표시됩니다.";
            updateUI();
        }

        // Apply Math Function
        function applyFunction() {
            if (dataStorage.length === 0) return;
            
            const mult = parseFloat(document.getElementById('funcMult').value) || 0;
            const add = parseFloat(document.getElementById('funcAdd').value) || 0;
            
            const results = dataStorage.map(x => (x * mult + add).toFixed(2));
            document.getElementById('funcResult').innerHTML = `<strong>결과:</strong> [${results.join(', ')}]`;
        }

        // Update UI & Calculations
        function updateUI() {
            const listContainer = document.getElementById('dataList');
            const countBadge = document.getElementById('dataCount');
            
            // Update List
            if (dataStorage.length === 0) {
                listContainer.innerHTML = '<p class="text-slate-400 text-center mt-10">데이터가 없습니다.</p>';
                countBadge.innerText = '0개';
            } else {
                countBadge.innerText = `${dataStorage.length}개`;
                listContainer.innerHTML = dataStorage.map((val, idx) => `
                    <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-slate-100 shadow-sm group">
                        <span class="font-mono font-medium text-slate-700">${val}</span>
                        <button onclick="deleteItem(${idx})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `).join('');
            }

            // Calculations
            if (dataStorage.length > 0) {
                const sum = dataStorage.reduce((a, b) => a + b, 0);
                const avg = sum / dataStorage.length;
                
                // Median
                const sorted = [...dataStorage].sort((a, b) => a - b);
                const mid = Math.floor(sorted.length / 2);
                const median = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;

                // Std Dev
                const variance = dataStorage.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / dataStorage.length;
                const stdDev = Math.sqrt(variance);

                document.getElementById('statSum').innerText = sum.toLocaleString();
                document.getElementById('statAvg').innerText = avg.toFixed(2);
                document.getElementById('statMedian').innerText = median.toFixed(2);
                document.getElementById('statStdDev').innerText = stdDev.toFixed(2);
            } else {
                ['statSum', 'statAvg', 'statMedian', 'statStdDev'].forEach(id => {
                    document.getElementById(id).innerText = '0';
                });
            }

            // Update Chart
            chartInstance.data.labels = dataStorage.map((_, i) => i + 1);
            chartInstance.data.datasets[0].data = dataStorage;
            chartInstance.update();
        }

        // Input enter key support
        document.getElementById('dataInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addData();
        });

        window.onload = initChart;
    </script>
</body>
</html>
